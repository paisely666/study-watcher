<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3366cc"/>
      <stop offset="100%" stop-color="#5c6bc0"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角方形 -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <!-- 打开的书本 -->
  <g transform="translate(256,240)" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左页 -->
    <path d="M-4,20 L-4,-120 Q-4,-140 -80,-130 L-120,-120 Q-138,-114 -134,-94 L-110,100 Q-108,116 -90,112 L-4,96 Z" fill="rgba(255,255,255,0.15)"/>
    <!-- 右页 -->
    <path d="M4,20 L4,-120 Q4,-140 80,-130 L120,-120 Q138,-114 134,-94 L110,100 Q108,116 90,112 L4,96 Z" fill="rgba(255,255,255,0.2)"/>
    <!-- 中间书脊线 -->
    <line x1="0" y1="-125" x2="0" y2="98" stroke-width="10"/>
  </g>
  <!-- 时钟 -->
  <g transform="translate(256,370)">
    <circle cx="0" cy="0" r="44" fill="none" stroke="#fff" stroke-width="12"/>
    <line x1="0" y1="0" x2="0" y2="-24" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="16" y2="6" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
